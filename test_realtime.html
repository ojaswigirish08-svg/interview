<!DOCTYPE html>
<html>
<head><title>ElevenLabs Realtime STT</title></head>
<body style="background:#0a0a1a;color:#eee;font-family:'Segoe UI',sans-serif;padding:40px;max-width:800px;margin:auto;">

    <h1 style="color:#a78bfa;text-align:center;">ElevenLabs Realtime Speech-to-Text</h1>
    <p style="text-align:center;color:#666;">Words appear as you speak — 150ms latency</p>

    <div style="margin:20px 0;text-align:center;">
        <input id="apiKey" type="password" placeholder="Paste your ElevenLabs API key"
            style="width:500px;padding:10px;background:#1a1a3e;color:#eee;border:1px solid #7c3aed;border-radius:8px;font-size:14px;">
    </div>

    <div style="text-align:center;margin:20px 0;">
        <button id="startBtn" onclick="start()"
            style="padding:14px 40px;font-size:16px;background:#7c3aed;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;">
            Start Recording
        </button>
        <button id="stopBtn" onclick="stop()" disabled
            style="padding:14px 40px;font-size:16px;background:#ef4444;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;opacity:0.3;">
            Stop
        </button>
    </div>

    <div style="background:#1a1a3e;padding:18px;border-radius:12px;margin:15px 0;border-left:4px dashed #7c3aed;min-height:50px;">
        <p style="font-size:11px;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Live (partial)</p>
        <p id="live" style="color:#a78bfa;font-size:18px;">...</p>
    </div>

    <div style="background:#1a1a3e;padding:18px;border-radius:12px;margin:15px 0;border-left:4px solid #10b981;min-height:50px;">
        <p style="font-size:11px;color:#10b981;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Final</p>
        <p id="final" style="color:#e2e8f0;font-size:18px;line-height:1.6;"></p>
    </div>

    <p id="status" style="text-align:center;color:#666;margin-top:15px;font-size:14px;">Enter API key and click Start</p>
    <p id="debug" style="text-align:center;color:#444;font-size:12px;"></p>

<script>
let ws, audioContext, micSource, stream;

async function getToken(apiKey) {
    // Step 1: Get a single-use token from ElevenLabs API
    const resp = await fetch('https://api.elevenlabs.io/v1/single-use-token/realtime_scribe', {
        method: 'POST',
        headers: {
            'xi-api-key': apiKey
        }
    });
    if (!resp.ok) {
        const err = await resp.text();
        throw new Error('Token error (' + resp.status + '): ' + err);
    }
    const data = await resp.json();
    return data.token;
}

async function start() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { alert('Enter your ElevenLabs API key first'); return; }

    document.getElementById('status').textContent = 'Getting token...';
    document.getElementById('status').style.color = '#a78bfa';
    document.getElementById('final').textContent = '';
    document.getElementById('live').textContent = '...';

    // Step 1: Get single-use token
    let token;
    try {
        token = await getToken(key);
        document.getElementById('debug').textContent = 'Token received!';
    } catch(e) {
        document.getElementById('status').textContent = 'Token failed: ' + e.message;
        document.getElementById('status').style.color = '#ef4444';
        console.error('Token error:', e);
        return;
    }

    // Step 2: Get microphone
    document.getElementById('status').textContent = 'Getting microphone...';
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
        document.getElementById('status').textContent = 'Microphone denied!';
        document.getElementById('status').style.color = '#ef4444';
        return;
    }

    // Step 3: Create AudioContext
    audioContext = new AudioContext();
    const actualSR = audioContext.sampleRate;

    // Find closest supported sample rate
    const supported = [8000, 16000, 22050, 24000, 44100, 48000];
    let useSR = supported.reduce((prev, curr) =>
        Math.abs(curr - actualSR) < Math.abs(prev - actualSR) ? curr : prev
    );
    document.getElementById('debug').textContent = 'Browser: ' + actualSR + 'Hz | Using: pcm_' + useSR;

    // Step 4: Connect WebSocket with TOKEN (not API key)
    document.getElementById('status').textContent = 'Connecting WebSocket...';

    const url = 'wss://api.elevenlabs.io/v1/speech-to-text/realtime'
        + '?token=' + encodeURIComponent(token)
        + '&model_id=scribe_v2_realtime'
        + '&audio_format=pcm_' + useSR
        + '&commit_strategy=vad'
        + '&language_code=en';

    ws = new WebSocket(url);

    ws.onopen = () => {
        document.getElementById('status').textContent = 'Connected! Speak now...';
        document.getElementById('status').style.color = '#10b981';
        startSendingAudio(useSR);
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        const type = msg.message_type || '';
        console.log('[EL]', type, msg);

        if (type === 'partial_transcript' && msg.text) {
            document.getElementById('live').textContent = msg.text;
        } else if (type === 'committed_transcript' && msg.text) {
            document.getElementById('final').textContent += msg.text + ' ';
            document.getElementById('live').textContent = '...';
        } else if (type === 'session_started') {
            document.getElementById('debug').textContent += ' | Session: ' + (msg.session_id || 'ok');
        }
    };

    ws.onerror = (e) => {
        document.getElementById('status').textContent = 'WebSocket error — check F12';
        document.getElementById('status').style.color = '#ef4444';
        console.error('WS Error:', e);
    };

    ws.onclose = (e) => {
        document.getElementById('status').textContent = 'Closed: ' + e.code + ' — ' + (e.reason || 'no reason');
        document.getElementById('status').style.color = '#ef4444';
        console.log('WS Closed:', e.code, e.reason);
        resetButtons();
    };

    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('stopBtn').style.opacity = '1';
}

function startSendingAudio(sampleRate) {
    micSource = audioContext.createMediaStreamSource(stream);
    const processor = audioContext.createScriptProcessor(4096, 1, 1);
    window._processor = processor;

    processor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
        }

        const bytes = new Uint8Array(int16.buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }

        ws.send(JSON.stringify({
            message_type: 'input_audio_chunk',
            audio_base_64: btoa(binary),
            sample_rate: sampleRate
        }));
    };

    micSource.connect(processor);
    processor.connect(audioContext.destination);
}

function stop() {
    if (window._processor) window._processor.disconnect();
    if (micSource) micSource.disconnect();
    if (audioContext) audioContext.close();
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (ws) ws.close();
    resetButtons();
    document.getElementById('status').textContent = 'Stopped.';
    document.getElementById('status').style.color = '#666';
    document.getElementById('live').textContent = '(stopped)';
}

function resetButtons() {
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('stopBtn').style.opacity = '0.3';
}
</script>
</body>
</html>
