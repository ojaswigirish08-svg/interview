<!DOCTYPE html>
<html>
<head><title>OpenAI Realtime STT</title></head>
<body style="background:#0a0f1a;color:#eee;font-family:'Segoe UI',sans-serif;padding:40px;max-width:800px;margin:auto;">

    <h1 style="color:#74aa9c;text-align:center;">OpenAI Realtime Speech-to-Text</h1>
    <p style="text-align:center;color:#666;">gpt-4o-transcribe — Words appear as you speak</p>

    <div style="margin:20px 0;text-align:center;">
        <input id="apiKey" type="password" placeholder="Paste your OpenAI API key (sk-...)"
            style="width:500px;padding:10px;background:#1a1f2e;color:#eee;border:1px solid #74aa9c;border-radius:8px;font-size:14px;">
    </div>

    <div style="text-align:center;margin:10px 0;">
        <label style="color:#888;font-size:13px;">Model: </label>
        <select id="modelSelect" style="background:#1a1f2e;color:#eee;border:1px solid #74aa9c;padding:6px 12px;border-radius:6px;">
            <option value="gpt-4o-transcribe">gpt-4o-transcribe ($0.36/hr)</option>
            <option value="gpt-4o-mini-transcribe">gpt-4o-mini-transcribe ($0.18/hr)</option>
        </select>
    </div>

    <div style="text-align:center;margin:20px 0;">
        <button id="startBtn" onclick="start()"
            style="padding:14px 40px;font-size:16px;background:#74aa9c;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;">
            Start Recording
        </button>
        <button id="stopBtn" onclick="stop()" disabled
            style="padding:14px 40px;font-size:16px;background:#ef4444;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;opacity:0.3;">
            Stop
        </button>
    </div>

    <div style="background:#1a1f2e;padding:18px;border-radius:12px;margin:15px 0;border-left:4px dashed #74aa9c;min-height:50px;">
        <p style="font-size:11px;color:#74aa9c;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Live (delta — updates as you speak)</p>
        <p id="live" style="color:#74aa9c;font-size:18px;">...</p>
    </div>

    <div style="background:#1a1f2e;padding:18px;border-radius:12px;margin:15px 0;border-left:4px solid #10b981;min-height:50px;">
        <p style="font-size:11px;color:#10b981;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Final (completed after each pause)</p>
        <p id="final" style="color:#e2e8f0;font-size:18px;line-height:1.6;"></p>
    </div>

    <p id="status" style="text-align:center;color:#666;margin-top:15px;font-size:14px;">Enter API key and click Start</p>
    <p id="debug" style="text-align:center;color:#444;font-size:12px;"></p>

<script>
let ws, audioContext, processor, micSource, stream;
let currentDelta = '';

async function start() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { alert('Enter your OpenAI API key'); return; }

    const model = document.getElementById('modelSelect').value;

    document.getElementById('status').textContent = 'Connecting to OpenAI...';
    document.getElementById('status').style.color = '#74aa9c';
    document.getElementById('final').textContent = '';
    document.getElementById('live').textContent = '...';
    currentDelta = '';

    // Step 1: Get microphone
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
        document.getElementById('status').textContent = 'Microphone denied!';
        document.getElementById('status').style.color = '#ef4444';
        return;
    }

    // Step 2: Create AudioContext at 24kHz (OpenAI requires pcm16 at 24kHz)
    try {
        audioContext = new AudioContext({ sampleRate: 24000 });
    } catch(e) {
        audioContext = new AudioContext();
    }
    const actualSR = audioContext.sampleRate;
    document.getElementById('debug').textContent = 'Sample rate: ' + actualSR + 'Hz | Model: ' + model;

    // Step 3: Connect WebSocket
    const url = 'wss://api.openai.com/v1/realtime?intent=transcription';

    ws = new WebSocket(url, [
        'realtime',
        'openai-insecure-api-key.' + key,
        'openai-beta.realtime-v1'
    ]);

    ws.onopen = () => {
        document.getElementById('status').textContent = 'Connected! Configuring session...';

        // Send session config
        ws.send(JSON.stringify({
            type: 'transcription_session.update',
            session: {
                input_audio_format: 'pcm16',
                input_audio_transcription: {
                    model: model,
                    language: 'en'
                },
                turn_detection: {
                    type: 'server_vad',
                    threshold: 0.5,
                    silence_duration_ms: 500
                },
                input_audio_noise_reduction: {
                    type: 'near_field'
                }
            }
        }));
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        const type = msg.type || '';
        console.log('[OpenAI]', type, msg);

        // Session configured
        if (type === 'transcription_session.created' || type === 'transcription_session.updated') {
            document.getElementById('status').textContent = 'Ready! Speak now...';
            document.getElementById('status').style.color = '#10b981';
            startSendingAudio(actualSR);
        }

        // Live delta (words appearing)
        else if (type === 'conversation.item.input_audio_transcription.delta') {
            currentDelta += (msg.delta || '');
            document.getElementById('live').textContent = currentDelta;
        }

        // Final transcript (after pause)
        else if (type === 'conversation.item.input_audio_transcription.completed') {
            const text = msg.transcript || currentDelta;
            if (text.trim()) {
                document.getElementById('final').textContent += text.trim() + ' ';
            }
            document.getElementById('live').textContent = '...';
            currentDelta = '';
        }

        // Errors
        else if (type === 'error') {
            const errMsg = msg.error?.message || JSON.stringify(msg.error);
            document.getElementById('status').textContent = 'Error: ' + errMsg;
            document.getElementById('status').style.color = '#ef4444';
            console.error('OpenAI Error:', msg);
        }
    };

    ws.onerror = (e) => {
        document.getElementById('status').textContent = 'WebSocket error — check F12';
        document.getElementById('status').style.color = '#ef4444';
        console.error('WS Error:', e);
    };

    ws.onclose = (e) => {
        document.getElementById('status').textContent = 'Closed: ' + e.code + ' — ' + (e.reason || 'no reason');
        document.getElementById('status').style.color = '#ef4444';
        console.log('WS Closed:', e.code, e.reason);
        resetButtons();
    };

    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('stopBtn').style.opacity = '1';
}

function startSendingAudio(sampleRate) {
    micSource = audioContext.createMediaStreamSource(stream);
    processor = audioContext.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
        }

        const bytes = new Uint8Array(int16.buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }

        ws.send(JSON.stringify({
            type: 'input_audio_buffer.append',
            audio: btoa(binary)
        }));
    };

    micSource.connect(processor);
    processor.connect(audioContext.destination);
}

function stop() {
    if (processor) processor.disconnect();
    if (micSource) micSource.disconnect();
    if (audioContext) audioContext.close();
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (ws) ws.close();
    resetButtons();
    document.getElementById('status').textContent = 'Stopped.';
    document.getElementById('status').style.color = '#666';
    document.getElementById('live').textContent = '(stopped)';
}

function resetButtons() {
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('stopBtn').style.opacity = '0.3';
}
</script>
</body>
</html>
